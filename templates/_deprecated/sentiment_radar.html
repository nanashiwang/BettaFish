<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A 股舆情雷达 · 极简预判版</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --panel: #ffffff;
            --ink: #111827;
            --muted: #667085;
            --line: #dce3ec;
            --blue: #2f6df6;
            --blue-soft: #e9f0ff;
            --green: #19a56b;
            --green-soft: #e9f8f1;
            --amber: #f59e0b;
            --amber-soft: #fff7df;
            --red: #ef4444;
            --red-soft: #fff0f0;
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
            --radius: 22px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at 12% 8%, rgba(47, 109, 246, 0.16), transparent 32%),
                radial-gradient(circle at 90% 0%, rgba(25, 165, 107, 0.12), transparent 26%),
                var(--bg);
            color: var(--ink);
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
        }

        button, input { font: inherit; }

        .shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            height: 76px;
            padding: 0 28px;
            background: rgba(255, 255, 255, 0.88);
            border-bottom: 1px solid rgba(220, 227, 236, 0.85);
            backdrop-filter: blur(18px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 230px;
        }

        .mark {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background:
                conic-gradient(from 160deg, #79a7ff, #2f6df6, #bcd3ff, #79a7ff);
            position: relative;
            box-shadow: inset 0 0 0 8px #eef4ff;
        }

        .mark::after {
            content: "";
            position: absolute;
            inset: 12px;
            border-radius: 50%;
            background: #fff;
            border: 4px solid var(--blue);
        }

        .brand-title {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.02em;
        }

        .brand-badge {
            padding: 4px 8px;
            border-radius: 999px;
            color: var(--blue);
            background: var(--blue-soft);
            font-size: 12px;
            font-weight: 800;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(245, 247, 251, 0.78);
            padding: 6px;
            border-radius: 999px;
            border: 1px solid var(--line);
        }

        .nav-btn {
            border: 0;
            background: transparent;
            padding: 10px 30px;
            border-radius: 999px;
            color: #344054;
            font-weight: 900;
            cursor: pointer;
            transition: background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
        }

        .nav-btn.active {
            color: #fff;
            background: var(--blue);
            box-shadow: 0 10px 22px rgba(47, 109, 246, 0.28);
        }

        .disclaimer {
            color: #365178;
            background: #eef4ff;
            border: 1px solid #d5e2ff;
            border-radius: 14px;
            padding: 9px 13px;
            font-size: 13px;
            font-weight: 800;
            white-space: nowrap;
        }

        .home-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
        }

        main {
            width: min(1500px, calc(100vw - 48px));
            margin: 22px auto 34px;
        }

        .page { display: none; }
        .page.active { display: block; }

        .hero {
            border-radius: 28px;
            background:
                linear-gradient(100deg, rgba(255,255,255,0.98), rgba(232,240,255,0.92)),
                radial-gradient(circle at 86% 48%, rgba(47,109,246,0.25), transparent 30%);
            border: 1px solid #d9e5ff;
            box-shadow: var(--shadow);
            padding: 34px 38px;
            display: grid;
            grid-template-columns: 100px 1fr auto;
            gap: 28px;
            align-items: center;
        }

        .hero-icon {
            width: 84px;
            height: 84px;
            border-radius: 26px;
            background: linear-gradient(135deg, #eff5ff, #d9e7ff);
            position: relative;
        }

        .hero-icon::before,
        .hero-icon::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            border: 3px solid var(--blue);
        }

        .hero-icon::before { inset: 18px; opacity: 0.35; }
        .hero-icon::after { inset: 30px; background: var(--blue); }

        .hero h1 {
            margin: 0;
            font-size: clamp(28px, 4vw, 42px);
            line-height: 1.35;
            letter-spacing: -0.03em;
        }

        .hero-meta {
            color: var(--muted);
            margin-top: 12px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            font-weight: 700;
        }

        .refresh-btn,
        .primary-btn,
        .ghost-btn {
            border: 0;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 900;
            transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }

        .refresh-btn {
            color: var(--blue);
            background: #fff;
            border: 1px solid #d5e2ff;
            padding: 12px 16px;
        }

        .primary-btn {
            color: #fff;
            background: var(--blue);
            padding: 12px 18px;
            box-shadow: 0 12px 24px rgba(47, 109, 246, 0.24);
        }

        .ghost-btn {
            color: var(--blue);
            background: var(--blue-soft);
            padding: 10px 14px;
        }

        .refresh-btn:hover,
        .primary-btn:hover,
        .ghost-btn:hover {
            transform: translateY(-1px);
        }

        .section-title {
            margin: 30px 0 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .section-title h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 950;
        }

        .section-title .hint {
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .prediction-card,
        .mini-card,
        .focus-card,
        .settings-card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .prediction-card {
            padding: 24px;
            min-height: 318px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: relative;
            overflow: hidden;
        }

        .prediction-card::after {
            content: "";
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            right: -72px;
            top: -72px;
            background: var(--blue-soft);
            opacity: 0.72;
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            position: relative;
            z-index: 1;
        }

        .rank {
            width: 42px;
            height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            color: #fff;
            background: var(--blue);
            font-weight: 950;
            font-size: 20px;
            box-shadow: 0 12px 24px rgba(47, 109, 246, 0.24);
        }

        .strength {
            color: var(--red);
            background: var(--red-soft);
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
        }

        .prediction-card h3 {
            margin: 0;
            font-size: 22px;
            position: relative;
            z-index: 1;
        }

        .facts {
            display: grid;
            gap: 8px;
            position: relative;
            z-index: 1;
            flex: 1;
        }

        .fact {
            display: grid;
            grid-template-columns: 82px 1fr;
            gap: 8px;
            align-items: start;
            line-height: 1.55;
            font-size: 14px;
        }

        .fact-label {
            color: #475467;
            background: #f1f4f8;
            border-radius: 10px;
            padding: 4px 8px;
            font-weight: 900;
            text-align: center;
        }

        .fact-text { color: #1f2937; }

        .card-footer {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 4px;
        }

        .tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tag {
            color: var(--muted);
            background: #f3f6fa;
            border-radius: 999px;
            padding: 5px 8px;
            font-size: 12px;
            font-weight: 800;
        }

        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .mini-card {
            padding: 22px;
        }

        .mini-card h3,
        .focus-card h3,
        .settings-card h3 {
            margin: 0 0 14px;
            font-size: 18px;
        }

        .mini-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #edf1f5;
            color: var(--muted);
            font-weight: 700;
        }

        .mini-row:last-child { border-bottom: 0; }
        .mini-row b { color: var(--ink); }

        .risk-card {
            border-color: #ffd3d3;
            background: linear-gradient(180deg, #fff, var(--red-soft));
        }

        .risk-title {
            color: var(--red);
            font-weight: 950;
            font-size: 17px;
            margin-bottom: 10px;
        }

        .evidence-icons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .evidence-item {
            text-align: center;
            padding: 12px 8px;
            border-radius: 15px;
            background: #f7f9fc;
        }

        .evidence-item .count {
            margin-top: 4px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
        }

        .focus-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }

        .focus-card {
            padding: 22px;
        }

        .focus-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .pill {
            border-radius: 999px;
            padding: 6px 9px;
            font-size: 12px;
            font-weight: 900;
            background: var(--blue-soft);
            color: var(--blue);
        }

        .pill.warn { background: var(--amber-soft); color: #b45309; }
        .pill.risk { background: var(--red-soft); color: var(--red); }
        .pill.ok { background: var(--green-soft); color: var(--green); }

        .settings-grid {
            display: grid;
            grid-template-columns: 1.1fr 1fr 1fr;
            gap: 18px;
        }

        .settings-card {
            padding: 22px;
        }

        .chip-list {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chip {
            border: 1px solid var(--line);
            background: #fff;
            border-radius: 999px;
            padding: 8px 10px;
            color: #344054;
            font-weight: 800;
            font-size: 13px;
        }

        .template-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 11px 0;
            border-bottom: 1px solid #edf1f5;
        }

        .template-row:last-child { border-bottom: 0; }

        .switch {
            width: 44px;
            height: 24px;
            border-radius: 999px;
            background: #cbd5e1;
            padding: 3px;
            cursor: pointer;
            transition: background 0.18s ease;
        }

        .switch.on { background: var(--green); }

        .switch span {
            display: block;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            transition: transform 0.18s ease;
        }

        .switch.on span { transform: translateX(20px); }

        .drawer-mask {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.30);
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease;
        }

        .drawer-mask.open {
            opacity: 1;
            pointer-events: auto;
        }

        .drawer {
            position: fixed;
            z-index: 100;
            top: 0;
            right: 0;
            width: min(560px, 92vw);
            height: 100vh;
            background: #fff;
            box-shadow: -24px 0 60px rgba(15, 23, 42, 0.22);
            transform: translateX(105%);
            transition: transform 0.22s ease;
            display: flex;
            flex-direction: column;
        }

        .drawer.open { transform: translateX(0); }

        .drawer-head {
            padding: 24px;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .drawer-head h2 {
            margin: 0;
            font-size: 24px;
        }

        .close-btn {
            border: 0;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            cursor: pointer;
            background: #f1f4f8;
            color: #344054;
            font-size: 22px;
            line-height: 1;
        }

        .drawer-body {
            padding: 24px;
            overflow-y: auto;
        }

        .drawer-section {
            margin-bottom: 22px;
        }

        .drawer-section h3 {
            margin: 0 0 10px;
            font-size: 16px;
        }

        .drawer-section p,
        .drawer-section li {
            color: #475467;
            line-height: 1.7;
        }

        .timeline {
            border-left: 2px solid #d5e2ff;
            padding-left: 16px;
            display: grid;
            gap: 12px;
        }

        .timeline-item {
            position: relative;
            padding: 10px 12px;
            border-radius: 14px;
            background: #f7f9fc;
        }

        .timeline-item::before {
            content: "";
            position: absolute;
            left: -23px;
            top: 16px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--blue);
        }

        .timeline-item b { display: block; }

        .evidence-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .evidence-table th,
        .evidence-table td {
            padding: 10px 8px;
            border-bottom: 1px solid #edf1f5;
            text-align: left;
        }

        .evidence-table th { color: var(--muted); }

        .loading,
        .empty {
            color: var(--muted);
            padding: 30px;
            text-align: center;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 28px;
            transform: translateX(-50%) translateY(20px);
            background: var(--ink);
            color: #fff;
            border-radius: 999px;
            padding: 12px 18px;
            font-weight: 800;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease, transform 0.18s ease;
            z-index: 120;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 1080px) {
            .topbar { height: auto; padding: 16px; flex-wrap: wrap; }
            .brand { min-width: auto; }
            .nav { order: 3; width: 100%; justify-content: center; }
            main { width: min(100vw - 28px, 1500px); }
            .hero { grid-template-columns: 1fr; }
            .cards,
            .bottom-grid,
            .focus-grid,
            .settings-grid { grid-template-columns: 1fr; }
            .evidence-icons { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="shell">
    <header class="topbar">
        <div class="brand">
            <div class="mark" aria-hidden="true"></div>
            <div>
                <div class="brand-title">A 股舆情雷达 <span class="brand-badge">极简预判版</span></div>
            </div>
        </div>

        <nav class="nav" aria-label="主导航">
            <button class="nav-btn active" data-page="today">今日</button>
            <button class="nav-btn" data-page="my">我的</button>
            <button class="nav-btn" data-page="settings">设置</button>
        </nav>

        <div style="display:flex;align-items:center;gap:12px">
            <a class="home-link" href="/radar/login">登录</a>
            <a class="home-link" href="/radar/subscription">订阅</a>
            <a class="home-link" href="/radar/account">账户</a>
            <a class="home-link" href="/radar/admin">后台</a>
            <a class="home-link" href="/">返回主页</a>
            <div class="disclaimer" id="disclaimer">仅供舆情观察 · 不构成投资建议</div>
        </div>
    </header>

    <main>
        <section class="page active" id="page-today">
            <div id="todayContent" class="loading">正在读取今日预判...</div>
        </section>

        <section class="page" id="page-my">
            <div class="section-title">
                <h2>我的关注</h2>
                <span class="hint">只看和我有关的变化</span>
            </div>
            <div id="myContent" class="loading">正在读取我的关注...</div>
        </section>

        <section class="page" id="page-settings">
            <div class="section-title">
                <h2>设置</h2>
                <span class="hint">尽量少配置，默认就能用</span>
            </div>
            <div id="settingsContent" class="loading">正在读取设置...</div>
        </section>
    </main>
</div>

<div class="drawer-mask" id="drawerMask"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-head">
        <div>
            <h2 id="drawerTitle">解析</h2>
            <div class="hero-meta" id="drawerMeta"></div>
        </div>
        <button class="close-btn" id="closeDrawer" aria-label="关闭">×</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
</aside>

<div class="toast" id="toast"></div>

<script>
    const state = {
        today: null,
        my: null,
        settings: null,
    };

    const api = {
        today: '/api/radar/today',
        my: '/api/radar/my',
        settings: '/api/radar/settings',
        detail: id => `/api/radar/predictions/${encodeURIComponent(id)}`,
    };

    const $ = selector => document.querySelector(selector);

    function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;',
        }[char]));
    }

    function showToast(message) {
        const el = $('#toast');
        el.textContent = message;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 1800);
    }

    async function fetchJson(url, options) {
        const response = await fetch(url, options);
        const data = await response.json();
        if (!response.ok || data.success === false) {
            throw new Error(data.message || '请求失败');
        }
        return data;
    }

    function switchPage(name) {
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.page === name);
        });
        document.querySelectorAll('.page').forEach(page => {
            page.classList.toggle('active', page.id === `page-${name}`);
        });
        if (name === 'my' && !state.my) loadMy();
        if (name === 'settings' && !state.settings) loadSettings();
    }

    function renderToday(data) {
        $('#disclaimer').textContent = data.disclaimer;
        const cards = data.cards.map(card => `
            <article class="prediction-card">
                <div class="card-top">
                    <span class="rank">${escapeHtml(card.rank)}</span>
                    <span class="strength">强度：${escapeHtml(card.strength)}</span>
                </div>
                <h3>${escapeHtml(card.title)}</h3>
                <div class="facts">
                    <div class="fact"><span class="fact-label">判断</span><span class="fact-text">${escapeHtml(card.judgement)}</span></div>
                    <div class="fact"><span class="fact-label">原因</span><span class="fact-text">${escapeHtml(card.reason)}</span></div>
                    <div class="fact"><span class="fact-label">风险</span><span class="fact-text">${escapeHtml(card.risk)}</span></div>
                    <div class="fact"><span class="fact-label">下一步</span><span class="fact-text">${escapeHtml(card.next)}</span></div>
                </div>
                <div class="card-footer">
                    <div class="tags">${card.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}</div>
                    <button class="ghost-btn" data-detail="${escapeHtml(card.id)}">查看证据</button>
                </div>
            </article>
        `).join('');

        $('#todayContent').innerHTML = `
            <section class="hero">
                <div class="hero-icon" aria-hidden="true"></div>
                <div>
                    <h1>${escapeHtml(data.headline)}</h1>
                    <div class="hero-meta">
                        <span>更新时间：${escapeHtml(data.updated_at)}</span>
                        <span>数据状态：每日多次更新</span>
                        <span>${escapeHtml(data.version)}</span>
                    </div>
                </div>
                <button class="refresh-btn" id="refreshToday">刷新</button>
            </section>

            <div class="section-title">
                <h2>今天只看这 3 条</h2>
                <span class="hint">先看判断，再看证据</span>
            </div>
            <div class="cards">${cards}</div>

            <div class="bottom-grid">
                <section class="mini-card">
                    <h3>和我有关</h3>
                    <p style="color:#475467;font-weight:800">${escapeHtml(data.my_related.summary)}</p>
                    <p style="line-height:1.7">${escapeHtml(data.my_related.highlight)}</p>
                    ${data.my_related.items.map(item => `
                        <div class="mini-row"><span>${escapeHtml(item.label)}</span><b>${escapeHtml(item.value)}</b></div>
                    `).join('')}
                </section>

                <section class="mini-card risk-card">
                    <h3>今日最高风险</h3>
                    <div class="risk-title">${escapeHtml(data.top_risk.title)}</div>
                    <p><b>涉及：</b>${escapeHtml(data.top_risk.scope)}</p>
                    <p><b>原因：</b>${escapeHtml(data.top_risk.reason)}</p>
                </section>

                <section class="mini-card">
                    <h3>证据来源概览</h3>
                    <div class="evidence-icons">
                        ${data.evidence_overview.map(item => `
                            <div class="evidence-item">
                                <b>${escapeHtml(item.name)}</b>
                                <div class="count">${escapeHtml(item.count)} 条</div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            </div>
        `;

        document.querySelectorAll('[data-detail]').forEach(btn => {
            btn.addEventListener('click', () => openDetail(btn.dataset.detail));
        });
        $('#refreshToday').addEventListener('click', loadToday);
    }

    async function loadToday() {
        $('#todayContent').innerHTML = '<div class="loading">正在读取今日预判...</div>';
        try {
            state.today = await fetchJson(api.today);
            renderToday(state.today);
        } catch (error) {
            $('#todayContent').innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
        }
    }

    function renderMy(data) {
        $('#myContent').innerHTML = `
            <div class="focus-grid">
                ${data.hits.map(hit => `
                    <article class="focus-card">
                        <div class="focus-meta">
                            <span class="pill">${escapeHtml(hit.type)}</span>
                            <span class="pill ok">${escapeHtml(hit.scenario)}</span>
                            <span class="pill risk">${escapeHtml(hit.risk)}</span>
                        </div>
                        <h3>${escapeHtml(hit.name)}</h3>
                        <div class="facts">
                            <div class="fact"><span class="fact-label">今日命中</span><span>${escapeHtml(hit.match)}</span></div>
                            <div class="fact"><span class="fact-label">下一步</span><span>${escapeHtml(hit.next)}</span></div>
                        </div>
                    </article>
                `).join('')}
            </div>
        `;
    }

    async function loadMy() {
        $('#myContent').innerHTML = '<div class="loading">正在读取我的关注...</div>';
        try {
            state.my = await fetchJson(api.my);
            renderMy(state.my);
        } catch (error) {
            $('#myContent').innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
        }
    }

    function renderSettings(data) {
        const settings = data.settings;
        $('#settingsContent').innerHTML = `
            <div class="settings-grid">
                <section class="settings-card">
                    <h3>我关注什么</h3>
                    <p style="color:#667085">股票</p>
                    <div class="chip-list">${settings.focus_targets.stocks.map(item => `<span class="chip">${escapeHtml(item)}</span>`).join('')}</div>
                    <p style="color:#667085">主题</p>
                    <div class="chip-list">${settings.focus_targets.themes.map(item => `<span class="chip">${escapeHtml(item)}</span>`).join('')}</div>
                    <p style="color:#667085">板块</p>
                    <div class="chip-list">${settings.focus_targets.sectors.map(item => `<span class="chip">${escapeHtml(item)}</span>`).join('')}</div>
                </section>
                <section class="settings-card">
                    <h3>什么时候推送</h3>
                    ${settings.push_templates.map(item => `
                        <div class="template-row">
                            <div>
                                <b>${escapeHtml(item.name)}</b>
                                <div style="color:#667085;font-size:13px">${escapeHtml(item.time)}</div>
                            </div>
                            <div class="switch ${item.enabled ? 'on' : ''}" data-template="${escapeHtml(item.id)}"><span></span></div>
                        </div>
                    `).join('')}
                </section>
                <section class="settings-card">
                    <h3>什么风险必须提醒</h3>
                    <div class="chip-list">${settings.risk_preferences.map(item => `<span class="chip">${escapeHtml(item)}</span>`).join('')}</div>
                    <h3 style="margin-top:22px">推送渠道</h3>
                    <div class="chip-list">${settings.channels.map(item => `<span class="chip">${escapeHtml(item)}</span>`).join('')}</div>
                    <button class="primary-btn" style="margin-top:22px;width:100%" id="saveSettings">保存设置</button>
                </section>
            </div>
        `;

        document.querySelectorAll('[data-template]').forEach(el => {
            el.addEventListener('click', () => {
                const item = settings.push_templates.find(row => row.id === el.dataset.template);
                if (item) item.enabled = !item.enabled;
                el.classList.toggle('on');
            });
        });

        $('#saveSettings').addEventListener('click', async () => {
            try {
                state.settings = await fetchJson(api.settings, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(settings),
                });
                showToast('设置已保存');
            } catch (error) {
                showToast(error.message);
            }
        });
    }

    async function loadSettings() {
        $('#settingsContent').innerHTML = '<div class="loading">正在读取设置...</div>';
        try {
            state.settings = await fetchJson(api.settings);
            renderSettings(state.settings);
        } catch (error) {
            $('#settingsContent').innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
        }
    }

    async function openDetail(id) {
        const drawer = $('#drawer');
        const mask = $('#drawerMask');
        $('#drawerTitle').textContent = '读取中...';
        $('#drawerMeta').innerHTML = '';
        $('#drawerBody').innerHTML = '<div class="loading">正在展开证据链...</div>';
        drawer.classList.add('open');
        mask.classList.add('open');
        drawer.setAttribute('aria-hidden', 'false');

        try {
            const data = await fetchJson(api.detail(id));
            const detail = data.detail;
            $('#drawerTitle').textContent = detail.title;
            $('#drawerMeta').innerHTML = `<span class="pill">${escapeHtml(detail.scenario)}</span><span>${escapeHtml(data.disclaimer)}</span>`;
            $('#drawerBody').innerHTML = `
                <section class="drawer-section">
                    <h3>情景判断</h3>
                    <p>${escapeHtml(detail.summary)}</p>
                </section>
                <section class="drawer-section">
                    <h3>为什么这么判断</h3>
                    <ul>${detail.why.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>
                </section>
                <section class="drawer-section">
                    <h3>新闻 / 舆情 / 价格时间线</h3>
                    <div class="timeline">
                        ${detail.timeline.map(item => `
                            <div class="timeline-item">
                                <b>${escapeHtml(item.time)} · ${escapeHtml(item.label)}</b>
                                <span>${escapeHtml(item.text)}</span>
                            </div>
                        `).join('')}
                    </div>
                </section>
                <section class="drawer-section">
                    <h3>证据链</h3>
                    <table class="evidence-table">
                        <thead><tr><th>来源</th><th>数量</th><th>可信度</th><th>说明</th></tr></thead>
                        <tbody>
                            ${detail.evidence_chain.map(item => `
                                <tr>
                                    <td>${escapeHtml(item.source)}</td>
                                    <td>${escapeHtml(item.count)}</td>
                                    <td>${escapeHtml(item.credibility)}</td>
                                    <td>${escapeHtml(item.note)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </section>
                <section class="drawer-section">
                    <h3>风险边界</h3>
                    <ul>${detail.risk_boundary.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>
                </section>
                <section class="drawer-section">
                    <h3>下一步观察</h3>
                    <ul>${detail.next_watch.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>
                </section>
            `;
        } catch (error) {
            $('#drawerTitle').textContent = '解析失败';
            $('#drawerBody').innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
        }
    }

    function closeDrawer() {
        $('#drawer').classList.remove('open');
        $('#drawerMask').classList.remove('open');
        $('#drawer').setAttribute('aria-hidden', 'true');
    }

    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => switchPage(btn.dataset.page));
    });
    $('#closeDrawer').addEventListener('click', closeDrawer);
    $('#drawerMask').addEventListener('click', closeDrawer);
    document.addEventListener('keydown', event => {
        if (event.key === 'Escape') closeDrawer();
    });

    loadToday();
</script>
</body>
</html>
